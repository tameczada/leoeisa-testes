# render.yaml — Render.com IaC config
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Web Service (Node.js app) ──────────────────────────────────────────
  - type: web
    name: leoeisa
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free            # upgrade to starter ($7/mo) for persistent uploads
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true           # Render generates a random secret
      - key: DATABASE_URL
        fromDatabase:
          name: leoeisa-db
          property: connectionString
      - key: TWITCH_CLIENT_ID
        sync: false                   # set manually in Render dashboard
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: TWITCH_REDIRECT_URI
        sync: false                   # https://cinevotequalquer.onrender.com/auth/twitch/callback
      - key: FRONTEND_URL
        sync: false                   # https://cinevote.onrender.com

  # ── PostgreSQL Database ────────────────────────────────────────────────
databases:
  - name: leoeisa-db
    databaseName: leoeisa
    region: oregon
    plan: free
